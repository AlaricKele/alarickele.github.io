<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的世界风格 - 随机地形（不透明修复）</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --panel-bg: rgba(20,20,40,0.85);
            --text: #e0e0e0;
            --accent: #5cb85c;
            --accent2: #f0ad4e;
        }
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            background:var(--bg);overflow:hidden;
            font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
            height:100vh;width:100vw;user-select:none;-webkit-user-select:none;
            -webkit-tap-highlight-color:transparent;cursor:grab;
        }
        body:active{cursor:grabbing;}
        #canvas-container{position:fixed;inset:0;z-index:1;}
        canvas{display:block;}

        #info-panel{
            position:fixed;top:16px;left:50%;transform:translateX(-50%);
            z-index:10;background:var(--panel-bg);
            border:1px solid rgba(255,255,255,0.2);border-radius:20px;
            padding:10px 22px;display:flex;align-items:center;gap:14px;
            backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
            box-shadow:0 8px 32px rgba(0,0,0,0.3);pointer-events:auto;
        }
        #info-panel .dot{width:10px;height:10px;border-radius:50%;background:#6ab04c;box-shadow:0 0 8px #6ab04c;}
        #info-panel span{color:var(--text);font-size:13px;letter-spacing:0.5px;}
        #info-panel .seed-display{color:#ffda79;font-weight:600;}

        #btn-group{
            position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
            z-index:10;display:flex;gap:12px;pointer-events:auto;
        }
        .btn{
            padding:12px 24px;border-radius:28px;border:none;
            font-size:14px;font-weight:600;cursor:pointer;letter-spacing:0.5px;
            transition:all 0.25s ease;backdrop-filter:blur(12px);
            -webkit-backdrop-filter:blur(12px);box-shadow:0 6px 20px rgba(0,0,0,0.3);
            outline:none;font-family:inherit;
        }
        .btn-regenerate{background:var(--accent);color:#fff;}
        .btn-regenerate:hover{background:#4cae4c;transform:translateY(-2px);}
        .btn-random{background:var(--accent2);color:#333;}
        .btn-random:hover{background:#ec971f;transform:translateY(-2px);}
        .btn-reset{background:rgba(255,255,255,0.1);color:#ccc;}
        .btn-reset:hover{background:rgba(255,255,255,0.2);color:#fff;transform:translateY(-2px);}
        .btn:active{transform:scale(0.96);}

        #legend{
            position:fixed;right:16px;top:50%;transform:translateY(-50%);
            z-index:10;background:var(--panel-bg);border-radius:16px;
            padding:14px 16px;border:1px solid rgba(255,255,255,0.15);
            backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
            box-shadow:0 6px 20px rgba(0,0,0,0.25);
            display:flex;flex-direction:column;gap:7px;
        }
        #legend .item{display:flex;align-items:center;gap:8px;font-size:11px;color:#ccc;}
        #legend .swatch{width:16px;height:16px;border-radius:3px;border:1px solid rgba(255,255,255,0.3);}
        @media(max-width:768px){
            #legend{right:4px;padding:8px 10px;gap:4px;}
            #legend .item{font-size:10px;}
            .btn{padding:10px 16px;font-size:12px;}
        }
    </style>
</head>
<body>
<div id="canvas-container"></div>

<div id="info-panel">
    <span class="dot"></span>
    <span>地形种子:</span>
    <span class="seed-display" id="seed-text">---</span>
</div>

<div id="legend">
    <div class="item"><span class="swatch" style="background:#4a7d2e;"></span> 草地</div>
    <div class="item"><span class="swatch" style="background:#6b4e0a;"></span> 泥土</div>
    <div class="item"><span class="swatch" style="background:#6b6b6b;"></span> 石头</div>
    <div class="item"><span class="swatch" style="background:#a68a3a;"></span> 沙地</div>
    <div class="item"><span class="swatch" style="background:#e0e0e0;"></span> 雪</div>
    <div class="item"><span class="swatch" style="background:#2255aa;"></span> 水</div>
    <div class="item"><span class="swatch" style="background:#2d5a2d;"></span> 树叶</div>
    <div class="item"><span class="swatch" style="background:#333333;"></span> 煤矿</div>
    <div class="item"><span class="swatch" style="background:#b87d4a;"></span> 铁矿</div>
</div>

<div id="btn-group">
    <button class="btn btn-regenerate" id="btn-regen">🔄 重新生成</button>
    <button class="btn btn-random" id="btn-random">🎲 随机地形</button>
    <button class="btn btn-reset" id="btn-reset">🏠 重置视角</button>
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const container = document.getElementById('canvas-container');
    const seedText = document.getElementById('seed-text');
    const btnRegen = document.getElementById('btn-regen');
    const btnRandom = document.getElementById('btn-random');
    const btnReset = document.getElementById('btn-reset');

    // 场景
    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#8ecafc');
    scene.fog = new THREE.Fog('#b0d8f8', 70, 160);

    const camera = new THREE.PerspectiveCamera(50, container.clientWidth/container.clientHeight, 1, 200);
    camera.position.set(30, 20, 30);
    camera.lookAt(0, 5, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.0;
    container.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 6, 0);
    controls.enableDamping = true;
    controls.dampingFactor = 0.12;
    controls.minDistance = 6;
    controls.maxDistance = 70;
    controls.maxPolarAngle = Math.PI * 0.5;
    controls.minPolarAngle = 0.1;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.3;
    controls.update();

    // 光照
    scene.add(new THREE.AmbientLight('#8899bb', 1.2));
    scene.add(new THREE.HemisphereLight('#ffffff', '#5577aa', 0.7));
    const sunLight = new THREE.DirectionalLight('#ffffff', 3.8);
    sunLight.position.set(30, 40, 20);
    sunLight.castShadow = true;
    sunLight.shadow.mapSize.width = 2048;
    sunLight.shadow.mapSize.height = 2048;
    sunLight.shadow.camera.near = 0.5;
    sunLight.shadow.camera.far = 120;
    sunLight.shadow.camera.left = -45;
    sunLight.shadow.camera.right = 45;
    sunLight.shadow.camera.top = 45;
    sunLight.shadow.camera.bottom = -45;
    sunLight.shadow.bias = -0.0002;
    scene.add(sunLight);

    // ---------- 像素纹理生成（完全无透明，水除外）----------
    function createTexture(canvasSize, drawFunc) {
        const canvas = document.createElement('canvas');
        canvas.width = canvasSize;
        canvas.height = canvasSize;
        const ctx = canvas.getContext('2d');
        drawFunc(ctx, canvasSize);
        const texture = new THREE.CanvasTexture(canvas);
        texture.magFilter = THREE.NearestFilter;
        texture.minFilter = THREE.NearestFilter;
        texture.wrapS = THREE.RepeatWrapping;
        texture.wrapT = THREE.RepeatWrapping;
        return texture;
    }

    function fillRect(ctx, x, y, w, h, color) {
        ctx.fillStyle = color;
        ctx.fillRect(x, y, w, h);
    }

    // 石头
    function stoneTex() {
        return createTexture(16, (ctx, s) => {
            fillRect(ctx, 0, 0, s, s, '#6b6b6b');
            ctx.fillStyle = '#505050';
            ctx.fillRect(2, 5, 2, 6); ctx.fillRect(7, 2, 1, 12);
            ctx.fillRect(12, 1, 2, 3); ctx.fillRect(10, 8, 3, 2);
            ctx.fillRect(4, 11, 5, 1); ctx.fillRect(14, 7, 1, 5);
            ctx.fillStyle = '#404040';
            ctx.fillRect(5, 3, 1, 1); ctx.fillRect(8, 10, 1, 1);
        });
    }

    // 泥土
    function dirtTex() {
        return createTexture(16, (ctx, s) => {
            fillRect(ctx, 0, 0, s, s, '#6b4e0a');
            ctx.fillStyle = '#4d3606';
            ctx.fillRect(3, 2, 2, 2); ctx.fillRect(10, 5, 1, 1);
            ctx.fillRect(6, 9, 3, 2); ctx.fillRect(13, 11, 2, 1);
            ctx.fillRect(1, 7, 1, 2);
            ctx.fillStyle = '#3a2804';
            ctx.fillRect(8, 3, 1, 1); ctx.fillRect(14, 4, 1, 1);
        });
    }

    // 草地顶面
    function grassTopTex() {
        return createTexture(16, (ctx, s) => {
            fillRect(ctx, 0, 0, s, s, '#4a7d2e');
            ctx.fillStyle = '#5e9e33';
            ctx.fillRect(2, 3, 2, 1); ctx.fillRect(7, 1, 1, 3);
            ctx.fillRect(11, 5, 3, 1); ctx.fillRect(4, 8, 2, 2);
            ctx.fillRect(13, 10, 1, 2); ctx.fillRect(1, 12, 3, 1);
            ctx.fillStyle = '#6daa3a';
            ctx.fillRect(9, 13, 1, 1); ctx.fillRect(6, 6, 1, 1);
        });
    }

    // 草地侧面
    function grassSideTex() {
        return createTexture(16, (ctx, s) => {
            fillRect(ctx, 0, 0, s, s, '#6b4e0a');
            fillRect(ctx, 0, 0, s, 3, '#4a7d2e');
            ctx.fillStyle = '#5e9e33';
            ctx.fillRect(2, 1, 2, 1); ctx.fillRect(10, 2, 3, 1);
            ctx.fillStyle = '#4d3606';
            ctx.fillRect(4, 6, 2, 1); ctx.fillRect(11, 8, 1, 2);
            ctx.fillRect(1, 10, 2, 2);
        });
    }

    // 沙子
    function sandTex() {
        return createTexture(16, (ctx, s) => {
            fillRect(ctx, 0, 0, s, s, '#a68a3a');
            ctx.fillStyle = '#8f752f';
            ctx.fillRect(3, 2, 1, 1); ctx.fillRect(7, 5, 2, 1);
            ctx.fillRect(12, 3, 1, 2); ctx.fillRect(5, 9, 1, 1);
            ctx.fillRect(10, 11, 2, 1); ctx.fillRect(1, 7, 1, 1);
            ctx.fillStyle = '#7a6227';
            ctx.fillRect(13, 8, 1, 1); ctx.fillRect(2, 13, 1, 1);
        });
    }

    // 雪
    function snowTex() {
        return createTexture(16, (ctx, s) => {
            fillRect(ctx, 0, 0, s, s, '#e0e0e0');
            ctx.fillStyle = '#c8d0d8';
            ctx.fillRect(4, 2, 1, 1); ctx.fillRect(10, 5, 2, 1);
            ctx.fillRect(2, 8, 1, 2); ctx.fillRect(13, 10, 1, 1);
            ctx.fillRect(7, 12, 2, 1);
        });
    }

    // 水（半透明，保留）
    function waterTex() {
        return createTexture(16, (ctx, s) => {
            fillRect(ctx, 0, 0, s, s, '#2255aa');
            ctx.fillStyle = '#4488cc';
            ctx.fillRect(2, 4, 4, 1); ctx.fillRect(9, 8, 5, 1);
            ctx.fillRect(1, 12, 6, 1); ctx.fillRect(6, 14, 5, 1);
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(4, 6, 2, 1); ctx.fillRect(11, 2, 1, 1);
        });
    }

    // 树叶
    function leavesTex() {
        return createTexture(16, (ctx, s) => {
            fillRect(ctx, 0, 0, s, s, '#2d5a2d');
            ctx.fillStyle = '#3a7a3a';
            ctx.fillRect(2, 2, 3, 2); ctx.fillRect(8, 1, 4, 3);
            ctx.fillRect(5, 6, 2, 2); ctx.fillRect(11, 7, 3, 2);
            ctx.fillRect(1, 10, 4, 2); ctx.fillRect(7, 12, 5, 2);
            ctx.fillStyle = '#1f401f';
            ctx.fillRect(3, 5, 1, 1); ctx.fillRect(10, 9, 1, 1);
            ctx.fillRect(2, 11, 1, 1); ctx.fillRect(8, 4, 1, 1);
        });
    }

    // 木头
    function woodTex() {
        return createTexture(16, (ctx, s) => {
            fillRect(ctx, 0, 0, s, s, '#6b3f1f');
            ctx.fillStyle = '#4d2b12';
            ctx.fillRect(0, 2, s, 1); ctx.fillRect(0, 5, s, 1);
            ctx.fillRect(0, 8, s, 1); ctx.fillRect(0, 11, s, 1);
            ctx.fillRect(0, 14, s, 1);
            ctx.fillStyle = '#8b5a2b';
            ctx.fillRect(3, 3, 2, 1); ctx.fillRect(10, 6, 3, 1);
            ctx.fillRect(1, 9, 2, 1); ctx.fillRect(8, 12, 4, 1);
        });
    }

    // 煤矿
    function coalOreTex() {
        return createTexture(16, (ctx, s) => {
            fillRect(ctx, 0, 0, s, s, '#6b6b6b');
            ctx.fillStyle = '#333333';
            ctx.fillRect(4, 3, 3, 3); ctx.fillRect(9, 7, 2, 2);
            ctx.fillRect(2, 9, 2, 3); ctx.fillRect(11, 12, 3, 2);
            ctx.fillStyle = '#505050';
            ctx.fillRect(7, 2, 1, 3); ctx.fillRect(13, 5, 2, 1);
        });
    }

    // 铁矿
    function ironOreTex() {
        return createTexture(16, (ctx, s) => {
            fillRect(ctx, 0, 0, s, s, '#6b6b6b');
            ctx.fillStyle = '#b87d4a';
            ctx.fillRect(3, 4, 2, 2); ctx.fillRect(10, 3, 2, 3);
            ctx.fillRect(6, 9, 3, 2); ctx.fillRect(12, 11, 2, 2);
            ctx.fillStyle = '#505050';
            ctx.fillRect(5, 2, 1, 4); ctx.fillRect(14, 7, 1, 3);
        });
    }

    // 基岩
    function bedrockTex() {
        return createTexture(16, (ctx, s) => {
            fillRect(ctx, 0, 0, s, s, '#2a2a2a');
            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(2, 3, 3, 2); ctx.fillRect(8, 6, 2, 3);
            ctx.fillRect(12, 2, 2, 2); ctx.fillRect(4, 9, 4, 2);
            ctx.fillRect(1, 13, 3, 2);
        });
    }

    // 花朵（不透明背景，深绿色，模拟草地上的花）
    function flowerTex(colorHex) {
        return createTexture(8, (ctx, s) => {
            // 不透明背景：用草地色填充
            fillRect(ctx, 0, 0, s, s, '#4a7d2e');
            // 画花
            ctx.fillStyle = colorHex;
            ctx.fillRect(2, 2, 4, 4);
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(3, 3, 2, 2);
        });
    }

    const BlockTypes = {
        BEDROCK: 'bedrock', STONE: 'stone', DIRT: 'dirt', GRASS: 'grass',
        SAND: 'sand', SNOW: 'snow', WATER: 'water', WOOD: 'wood',
        LEAVES: 'leaves', FLOWER: 'flower', COAL_ORE: 'coal_ore', IRON_ORE: 'iron_ore',
    };

    const texCache = new Map();
    function getMaterial(type, flowerColor = null) {
        // 草地多材质
        if (type === BlockTypes.GRASS) {
            if (!texCache.has('grassMats')) {
                const top = grassTopTex();
                const side = grassSideTex();
                const bottom = dirtTex();
                texCache.set('grassMats', [
                    new THREE.MeshStandardMaterial({ map: side, roughness: 0.7 }),
                    new THREE.MeshStandardMaterial({ map: side, roughness: 0.7 }),
                    new THREE.MeshStandardMaterial({ map: top, roughness: 0.7 }),
                    new THREE.MeshStandardMaterial({ map: bottom, roughness: 0.8 }),
                    new THREE.MeshStandardMaterial({ map: side, roughness: 0.7 }),
                    new THREE.MeshStandardMaterial({ map: side, roughness: 0.7 }),
                ]);
            }
            return texCache.get('grassMats');
        }
        // 水：保留透明
        if (type === BlockTypes.WATER) {
            if (!texCache.has('water')) {
                const tex = waterTex();
                const mat = new THREE.MeshStandardMaterial({
                    map: tex,
                    transparent: true,
                    opacity: 0.65,
                    roughness: 0.1,
                    depthWrite: true,
                });
                mat.renderOrder = 1;
                texCache.set('water', mat);
            }
            return texCache.get('water');
        }
        // 花朵：不透明
        if (type === BlockTypes.FLOWER && flowerColor) {
            const key = `flower_${flowerColor}`;
            if (!texCache.has(key)) {
                const tex = flowerTex(flowerColor);
                texCache.set(key, new THREE.MeshStandardMaterial({ map: tex, roughness: 0.6 }));
            }
            return texCache.get(key);
        }
        // 其他方块
        if (!texCache.has(type)) {
            let tex;
            switch(type) {
                case BlockTypes.STONE: tex = stoneTex(); break;
                case BlockTypes.DIRT: tex = dirtTex(); break;
                case BlockTypes.SAND: tex = sandTex(); break;
                case BlockTypes.SNOW: tex = snowTex(); break;
                case BlockTypes.WOOD: tex = woodTex(); break;
                case BlockTypes.LEAVES: tex = leavesTex(); break;
                case BlockTypes.COAL_ORE: tex = coalOreTex(); break;
                case BlockTypes.IRON_ORE: tex = ironOreTex(); break;
                case BlockTypes.BEDROCK: tex = bedrockTex(); break;
                default: tex = stoneTex();
            }
            texCache.set(type, new THREE.MeshStandardMaterial({ map: tex, roughness: 0.7 }));
        }
        return texCache.get(type);
    }

    const SIZE = 42;
    const HALF = SIZE/2;
    const WATER_LV = 3;
    const SNOW_LINE = 15;
    const STONE_LINE = 12;

    function hash2D(x,z,s){ const n = Math.sin(x*127.1+z*311.7+s*43758.5453)*43758.5453; return n - Math.floor(n); }
    function smoothNoise2D(x,z,s){
        const ix=Math.floor(x),iz=Math.floor(z),fx=x-ix,fz=z-iz;
        const sx=fx*fx*(3-2*fx),sz=fz*fz*(3-2*fz);
        const v00=hash2D(ix,iz,s),v10=hash2D(ix+1,iz,s),v01=hash2D(ix,iz+1,s),v11=hash2D(ix+1,iz+1,s);
        return v00+(v10-v00)*sx + (v01+(v11-v01)*sx - (v00+(v10-v00)*sx))*sz;
    }
    function fbm(x,z,s,o=6){ let v=0,a=1,f=1,m=0; for(let i=0;i<o;i++){ v+=a*smoothNoise2D(x*f,z*f,s+i*1000); m+=a; a*=0.5; f*=2; } return v/m; }
    function moist(x,z,s){ return fbm(x*0.7+5.3,z*0.7-3.1,s+50000,4); }

    function mulberry32(a){ return function(){ a|=0; a=a+0x6d2b79f5|0; let t=Math.imul(a^a>>>15,1|a); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }

    let terrainMeshes = [];
    const geo = new THREE.BoxGeometry(1,1,1);

    function collectBlocks(seed) {
        const map = new Map();
        for(let t of Object.values(BlockTypes)) map.set(t, []);
        const info = [];
        for(let ix=0; ix<SIZE; ix++) {
            for(let iz=0; iz<SIZE; iz++) {
                const wx=ix-HALF, wz=iz-HALF;
                const hRaw = fbm(wx*0.12, wz*0.12, seed, 7)*9+7;
                const h = Math.max(1, Math.min(19, Math.round(hRaw)));
                const m = (moist(wx,wz,seed)+1)/2;
                let surface;
                if(h<=WATER_LV+1) surface=BlockTypes.SAND;
                else if(h>=SNOW_LINE) surface=BlockTypes.SNOW;
                else if(h>=STONE_LINE) surface=BlockTypes.STONE;
                else if(m<0.12) surface=BlockTypes.SAND;
                else surface=BlockTypes.GRASS;

                map.get(BlockTypes.BEDROCK).push({x:wx,y:0,z:wz});
                const stoneTop = Math.max(1, h-4);
                for(let y=1; y<stoneTop; y++) {
                    const rng = mulberry32(seed+wx*1000+wz*100+y*10);
                    const rc = rng();
                    if(rc<0.06) map.get(BlockTypes.COAL_ORE).push({x:wx,y,z:wz});
                    else if(rc<0.09) map.get(BlockTypes.IRON_ORE).push({x:wx,y,z:wz});
                    else map.get(BlockTypes.STONE).push({x:wx,y,z:wz});
                }
                for(let y=stoneTop; y<h; y++) map.get(BlockTypes.DIRT).push({x:wx,y,z:wz});
                map.get(surface).push({x:wx,y:h,z:wz});
                if(h<WATER_LV) map.get(BlockTypes.WATER).push({x:wx,y:WATER_LV,z:wz});
                info.push({x:wx,z:wz,height:h,surface,moisture:m});
            }
        }
        return {map, info};
    }

    function placeTrees(map, info, seed) {
        const rng = mulberry32(seed+77777);
        for(const t of info) {
            if(t.surface!==BlockTypes.GRASS||t.height<WATER_LV+2||t.moisture<0.15||rng()>0.18) continue;
            const trunkH = 2+Math.floor(rng()*4);
            for(let y=t.height+1; y<=t.height+trunkH; y++) map.get(BlockTypes.WOOD).push({x:t.x,y,z:t.z});
            const cb = t.height+trunkH;
            for(let dx=-1;dx<=1;dx++) for(let dz=-1;dz<=1;dz++) if(dx||dz) map.get(BlockTypes.LEAVES).push({x:t.x+dx,y:cb,z:t.z+dz});
            const ct = cb+1;
            for(let dx=-1;dx<=1;dx++) for(let dz=-1;dz<=1;dz++) {
                if(Math.abs(dx)===1&&Math.abs(dz)===1&&rng()>0.5) continue;
                map.get(BlockTypes.LEAVES).push({x:t.x+dx,y:ct,z:t.z+dz});
            }
            if(rng()>0.4) {
                map.get(BlockTypes.LEAVES).push({x:t.x,y:ct+1,z:t.z});
                if(rng()>0.5) map.get(BlockTypes.LEAVES).push({x:t.x+1,y:ct+1,z:t.z});
                if(rng()>0.5) map.get(BlockTypes.LEAVES).push({x:t.x-1,y:ct+1,z:t.z});
            }
        }
    }

    function placeFlowers(map, info, seed) {
        const rng = mulberry32(seed+99999);
        const colors = ['#cc4444','#ccaa22','#cc6622','#cc4477','#bb66cc','#ffffff','#44aa44','#5599cc'];
        for(const t of info) {
            if(t.surface!==BlockTypes.GRASS||t.height<WATER_LV+1||rng()>0.08) continue;
            map.get(BlockTypes.FLOWER).push({x:t.x, y:t.height+1, z:t.z, color:colors[Math.floor(rng()*colors.length)]});
        }
    }

    function buildMeshes(blockMap) {
        const meshes = [];
        for(const [type, blocks] of blockMap) {
            if(!blocks.length) continue;
            let mat;
            if(type===BlockTypes.FLOWER) mat = getMaterial(type, blocks[0].color);
            else mat = getMaterial(type);
            const inst = new THREE.InstancedMesh(geo, mat, blocks.length);
            inst.castShadow = true;
            inst.receiveShadow = true;
            const dummy = new THREE.Object3D();
            for(let i=0; i<blocks.length; i++) {
                dummy.position.set(blocks[i].x, blocks[i].y, blocks[i].z);
                dummy.updateMatrix();
                inst.setMatrixAt(i, dummy.matrix);
            }
            inst.instanceMatrix.needsUpdate = true;
            meshes.push(inst);
        }
        return meshes;
    }

    function clear() {
        for(const m of terrainMeshes) {
            if(m.geometry && m.geometry!==geo) m.geometry.dispose();
            if(m.material) {
                if(Array.isArray(m.material)) m.material.forEach(x=>x.dispose());
                else m.material.dispose();
            }
            scene.remove(m);
        }
        terrainMeshes = [];
    }

    function generate(seed) {
        clear();
        const {map, info} = collectBlocks(seed);
        placeTrees(map, info, seed);
        placeFlowers(map, info, seed);
        terrainMeshes = buildMeshes(map);
        terrainMeshes.forEach(m=>scene.add(m));
        seedText.textContent = seed;
        console.log(`🌿 不透明纹理地形 种子:${seed}`);
    }

    let seed = Math.floor(Math.random()*1000000);
    generate(seed);

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', ()=>{
        camera.aspect = container.clientWidth/container.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(container.clientWidth, container.clientHeight);
    });

    btnRegen.addEventListener('click', ()=>generate(seed));
    btnRandom.addEventListener('click', ()=>{
        seed = Math.floor(Math.random()*1000000);
        generate(seed);
    });
    btnReset.addEventListener('click', ()=>{
        const sP = camera.position.clone();
        const sT = controls.target.clone();
        const tP = new THREE.Vector3(30,20,30);
        const tL = new THREE.Vector3(0,6,0);
        const t0 = performance.now();
        function anim(now){
            const t = Math.min((now-t0)/800,1);
            const e = t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;
            camera.position.lerpVectors(sP,tP,e);
            controls.target.lerpVectors(sT,tL,e);
            controls.update();
            if(t<1) requestAnimationFrame(anim);
        }
        requestAnimationFrame(anim);
        controls.autoRotate = true;
    });
    window.addEventListener('keydown', e=>{
        if(e.key==='r') { seed=Math.floor(Math.random()*1000000); generate(seed); }
        else if(e.key==='g') generate(seed);
        else if(e.key==='f') { controls.target.set(0,6,0); camera.position.set(30,20,30); controls.update(); }
        else if(e.key==='a') controls.autoRotate = !controls.autoRotate;
    });
</script>
</body>
</html>
