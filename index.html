<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的世界风格 - 随机地形生成器（修复版）</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --panel-bg: rgba(20, 20, 40, 0.9);
            --text: #e0e0e0;
            --accent: #5cb85c;
            --accent2: #f0ad4e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            overflow: hidden;
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            height: 100vh;
            width: 100vw;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            cursor: grab;
        }
        body:active { cursor: grabbing; }
        body.dragging { cursor: grabbing; }

        #canvas-container { position: fixed; inset: 0; z-index: 1; }
        canvas { display: block; }

        #info-panel {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: var(--panel-bg);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 20px;
            padding: 10px 22px;
            display: flex;
            align-items: center;
            gap: 14px;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            pointer-events: auto;
        }
        #info-panel .dot {
            width: 10px; height: 10px; border-radius: 50%; display: inline-block; flex-shrink: 0;
        }
        #info-panel .dot.green { background: #6ab04c; box-shadow: 0 0 8px #6ab04c; }
        #info-panel span { color: var(--text); font-size: 13px; letter-spacing: 0.5px; white-space: nowrap; }
        #info-panel .seed-display { color: #ffda79; font-weight: 600; font-size: 13px; }

        #btn-group {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            gap: 12px;
            pointer-events: auto;
        }
        .btn {
            padding: 12px 24px;
            border-radius: 28px;
            border: none;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: all 0.25s ease;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
            outline: none;
            font-family: inherit;
        }
        .btn-regenerate { background: var(--accent); color: #fff; border: 1px solid rgba(255,255,255,0.2); }
        .btn-regenerate:hover { background: #4cae4c; transform: translateY(-2px); box-shadow: 0 10px 28px rgba(92,184,92,0.4); }
        .btn-random { background: var(--accent2); color: #333; border: 1px solid rgba(255,255,255,0.2); }
        .btn-random:hover { background: #ec971f; transform: translateY(-2px); box-shadow: 0 10px 28px rgba(240,173,78,0.4); }
        .btn-reset { background: rgba(255,255,255,0.1); color: #ccc; border: 1px solid rgba(255,255,255,0.2); }
        .btn-reset:hover { background: rgba(255,255,255,0.2); color: #fff; transform: translateY(-2px); }
        .btn:active { transform: scale(0.96); }

        #legend {
            position: fixed;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 10;
            background: var(--panel-bg);
            border-radius: 16px;
            padding: 14px 16px;
            border: 1px solid rgba(255,255,255,0.12);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.25);
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            gap: 7px;
        }
        #legend .item { display: flex; align-items: center; gap: 8px; font-size: 11px; color: #ccc; }
        #legend .swatch { width: 16px; height: 16px; border-radius: 3px; flex-shrink: 0; border: 1px solid rgba(255,255,255,0.25); }

        @media (max-width: 768px) {
            #legend { right: 4px; padding: 8px 10px; gap: 4px; border-radius: 10px; }
            #legend .item { font-size: 10px; gap: 5px; }
            #legend .swatch { width: 12px; height: 12px; }
            #info-panel { padding: 8px 14px; gap: 8px; border-radius: 16px; top: 8px; }
            #info-panel span { font-size: 11px; }
            .btn { padding: 10px 16px; font-size: 12px; border-radius: 22px; }
            #btn-group { gap: 8px; bottom: 16px; }
        }
    </style>
</head>
<body>
<div id="canvas-container"></div>

<div id="info-panel">
    <span class="dot green"></span>
    <span>地形种子:</span>
    <span class="seed-display" id="seed-text">---</span>
</div>

<div id="legend">
    <div class="item"><span class="swatch" style="background:#f5f5f0;"></span> 雪</div>
    <div class="item"><span class="swatch" style="background:#8b8b7a;"></span> 岩石</div>
    <div class="item"><span class="swatch" style="background:#7ec850;"></span> 草地</div>
    <div class="item"><span class="swatch" style="background:#c2a64b;"></span> 沙地</div>
    <div class="item"><span class="swatch" style="background:#8b6914;"></span> 泥土</div>
    <div class="item"><span class="swatch" style="background:#6b6b6b;"></span> 石头</div>
    <div class="item"><span class="swatch" style="background:#4488cc;"></span> 水</div>
    <div class="item"><span class="swatch" style="background:#3d7a3d;"></span> 树叶</div>
    <div class="item"><span class="swatch" style="background:#444444;"></span> 煤矿</div>
    <div class="item"><span class="swatch" style="background:#d4a373;"></span> 铁矿</div>
</div>

<div id="btn-group">
    <button class="btn btn-regenerate" id="btn-regen">🔄 重新生成</button>
    <button class="btn btn-random" id="btn-random">🎲 随机地形</button>
    <button class="btn btn-reset" id="btn-reset">🏠 重置视角</button>
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // DOM 元素
    const container = document.getElementById('canvas-container');
    const seedText = document.getElementById('seed-text');
    const btnRegen = document.getElementById('btn-regen');
    const btnRandom = document.getElementById('btn-random');
    const btnReset = document.getElementById('btn-reset');

    // 场景初始化
    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#87ceeb');
    scene.fog = new THREE.Fog('#b8d8f0', 60, 150);

    const camera = new THREE.PerspectiveCamera(50, container.clientWidth / container.clientHeight, 1, 200);
    camera.position.set(35, 24, 35);
    camera.lookAt(0, 5, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.1;
    container.appendChild(renderer.domElement);

    // 控制器
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 6, 0);
    controls.enableDamping = true;
    controls.dampingFactor = 0.12;
    controls.minDistance = 6;
    controls.maxDistance = 70;
    controls.maxPolarAngle = Math.PI * 0.52;
    controls.minPolarAngle = 0.15;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.25;
    controls.update();

    // 光照
    scene.add(new THREE.AmbientLight('#8899bb', 1.6));
    scene.add(new THREE.HemisphereLight('#ffeeb1', '#446688', 0.9));
    const sunLight = new THREE.DirectionalLight('#fff8e7', 3.8);
    sunLight.position.set(25, 35, 15);
    sunLight.castShadow = true;
    sunLight.shadow.mapSize.width = 2048;
    sunLight.shadow.mapSize.height = 2048;
    sunLight.shadow.camera.near = 0.5;
    sunLight.shadow.camera.far = 120;
    sunLight.shadow.camera.left = -40;
    sunLight.shadow.camera.right = 40;
    sunLight.shadow.camera.top = 40;
    sunLight.shadow.camera.bottom = -40;
    sunLight.shadow.bias = -0.0003;
    sunLight.shadow.normalBias = 0.02;
    scene.add(sunLight);

    // 噪声函数
    function hash2D(x, z, seed) {
        const n = Math.sin(x * 127.1 + z * 311.7 + seed * 43758.5453) * 43758.5453;
        return n - Math.floor(n);
    }
    function smoothNoise2D(x, z, seed) {
        const ix = Math.floor(x), iz = Math.floor(z);
        const fx = x - ix, fz = z - iz;
        const sx = fx * fx * (3 - 2 * fx), sz = fz * fz * (3 - 2 * fz);
        const v00 = hash2D(ix, iz, seed), v10 = hash2D(ix + 1, iz, seed);
        const v01 = hash2D(ix, iz + 1, seed), v11 = hash2D(ix + 1, iz + 1, seed);
        const a = v00 + (v10 - v00) * sx, b = v01 + (v11 - v01) * sx;
        return a + (b - a) * sz;
    }
    function fbmNoise(x, z, seed, octaves = 6) {
        let value = 0, amplitude = 1, frequency = 1, maxVal = 0;
        for (let i = 0; i < octaves; i++) {
            value += amplitude * smoothNoise2D(x * frequency, z * frequency, seed + i * 1000);
            maxVal += amplitude;
            amplitude *= 0.5;
            frequency *= 2.0;
        }
        return value / maxVal;
    }
    function moistureNoise(x, z, seed) {
        return fbmNoise(x * 0.7 + 5.3, z * 0.7 - 3.1, seed + 50000, 4);
    }

    const TERRAIN_SIZE = 42;
    const HALF_SIZE = TERRAIN_SIZE / 2;
    const WATER_LEVEL = 3;
    const SNOW_LINE = 15;
    const STONE_LINE = 12;

    // 方块类型（新增矿石）
    const BlockTypes = {
        BEDROCK: 'bedrock',
        STONE: 'stone',
        DIRT: 'dirt',
        GRASS: 'grass',
        SAND: 'sand',
        SNOW: 'snow',
        WATER: 'water',
        WOOD: 'wood',
        LEAVES: 'leaves',
        FLOWER: 'flower',
        CLOUD: 'cloud',
        COAL_ORE: 'coal_ore',
        IRON_ORE: 'iron_ore',
    };

    const blockColors = {
        [BlockTypes.BEDROCK]: '#3d3d3d',
        [BlockTypes.STONE]: '#6b6b6b',
        [BlockTypes.DIRT]: '#8b6914',
        [BlockTypes.GRASS]: '#7ec850',
        [BlockTypes.SAND]: '#c2a64b',
        [BlockTypes.SNOW]: '#f5f5f0',
        [BlockTypes.WATER]: '#4488cc',
        [BlockTypes.WOOD]: '#7d5e3b',
        [BlockTypes.LEAVES]: '#3d7a3d',
        [BlockTypes.CLOUD]: '#fafeff',
        [BlockTypes.COAL_ORE]: '#444444',
        [BlockTypes.IRON_ORE]: '#d4a373',
    };

    const blockMaterialPresets = {
        [BlockTypes.WATER]: { transparent: true, opacity: 0.7, roughness: 0.2 },
        [BlockTypes.CLOUD]: { transparent: true, opacity: 0.85, roughness: 0.3 },
        [BlockTypes.SNOW]: { roughness: 0.5 },
        [BlockTypes.GRASS]: { roughness: 0.8 },
        [BlockTypes.SAND]: { roughness: 0.9 },
        [BlockTypes.DIRT]: { roughness: 0.85 },
        [BlockTypes.STONE]: { roughness: 0.7 },
        [BlockTypes.BEDROCK]: { roughness: 0.6 },
        [BlockTypes.WOOD]: { roughness: 0.75 },
        [BlockTypes.LEAVES]: { roughness: 0.7 },
        [BlockTypes.COAL_ORE]: { roughness: 0.65 },
        [BlockTypes.IRON_ORE]: { roughness: 0.6, metalness: 0.2 },
    };

    let terrainMeshes = [];
    const sharedGeometry = new THREE.BoxGeometry(1, 1, 1);

    // 伪随机数生成器
    function mulberry32(a) {
        return function() {
            a |= 0; a = (a + 0x6d2b79f5) | 0;
            let t = Math.imul(a ^ (a >>> 15), 1 | a);
            t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
            return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
        };
    }

    // 收集方块数据（全新生物群系规则）
    function collectBlocks(seed) {
        const blockMap = new Map();
        for (const type of Object.values(BlockTypes)) blockMap.set(type, []);
        const surfaceInfo = [];

        for (let ix = 0; ix < TERRAIN_SIZE; ix++) {
            for (let iz = 0; iz < TERRAIN_SIZE; iz++) {
                const worldX = ix - HALF_SIZE;
                const worldZ = iz - HALF_SIZE;

                const noiseVal = fbmNoise(worldX * 0.12, worldZ * 0.12, seed, 7);
                const rawHeight = noiseVal * 9 + 7;
                const height = Math.max(1, Math.min(19, Math.round(rawHeight)));

                const moisture = moistureNoise(worldX, worldZ, seed);
                const moistNorm = (moisture + 1) / 2; // 0~1

                // 修正生物群系：大部分区域都是草地，只有极低湿度才是沙漠，高海拔为岩石/雪
                let surfaceType;
                if (height <= WATER_LEVEL + 1) {
                    surfaceType = BlockTypes.SAND; // 海滩
                } else if (height >= SNOW_LINE) {
                    surfaceType = BlockTypes.SNOW;
                } else if (height >= STONE_LINE) {
                    surfaceType = BlockTypes.STONE;
                } else if (moistNorm < 0.15) {
                    surfaceType = BlockTypes.SAND; // 沙漠（极低湿度）
                } else {
                    surfaceType = BlockTypes.GRASS; // 默认草地
                }

                // 基岩
                blockMap.get(BlockTypes.BEDROCK).push({ x: worldX, y: 0, z: worldZ });

                // 地下层：石头（带矿石）和泥土
                const stoneTop = Math.max(1, height - 4); // 更多泥土层
                for (let y = 1; y < stoneTop; y++) {
                    // 在石头层中随机放置矿石
                    const oreRng = mulberry32(seed + worldX * 1000 + worldZ * 100 + y * 10);
                    const oreChance = oreRng();
                    if (oreChance < 0.06) {
                        blockMap.get(BlockTypes.COAL_ORE).push({ x: worldX, y, z: worldZ });
                    } else if (oreChance < 0.09) {
                        blockMap.get(BlockTypes.IRON_ORE).push({ x: worldX, y, z: worldZ });
                    } else {
                        blockMap.get(BlockTypes.STONE).push({ x: worldX, y, z: worldZ });
                    }
                }
                // 泥土层（stoneTop 到 height-1）
                for (let y = stoneTop; y < height; y++) {
                    blockMap.get(BlockTypes.DIRT).push({ x: worldX, y, z: worldZ });
                }
                // 表面
                blockMap.get(surfaceType).push({ x: worldX, y: height, z: worldZ });

                // 水
                if (height < WATER_LEVEL) {
                    blockMap.get(BlockTypes.WATER).push({ x: worldX, y: WATER_LEVEL, z: worldZ });
                }

                surfaceInfo.push({ x: worldX, z: worldZ, height, surfaceType, moisture: moistNorm });
            }
        }
        return { blockMap, surfaceInfo };
    }

    // 树木生成（提高概率）
    function placeTrees(blockMap, surfaceInfo, seed) {
        const rng = mulberry32(seed + 77777);
        for (const info of surfaceInfo) {
            const { x, z, height, surfaceType, moisture } = info;
            if (surfaceType !== BlockTypes.GRASS) continue;
            if (height < WATER_LEVEL + 2) continue;
            if (moisture < 0.2) continue; // 放宽湿度限制

            if (rng() > 0.18) continue; // 18% 概率生成树

            const trunkHeight = 2 + Math.floor(rng() * 4);
            const trunkBase = height + 1;
            const trunkTop = height + trunkHeight;
            for (let ty = trunkBase; ty <= trunkTop; ty++) {
                blockMap.get(BlockTypes.WOOD).push({ x, y: ty, z });
            }

            const crownBase = trunkTop;
            for (let dx = -1; dx <= 1; dx++) {
                for (let dz = -1; dz <= 1; dz++) {
                    if (dx === 0 && dz === 0) continue;
                    blockMap.get(BlockTypes.LEAVES).push({ x: x + dx, y: crownBase, z: z + dz });
                }
            }
            const crownTop = crownBase + 1;
            for (let dx = -1; dx <= 1; dx++) {
                for (let dz = -1; dz <= 1; dz++) {
                    if (Math.abs(dx) === 1 && Math.abs(dz) === 1 && rng() > 0.5) continue;
                    blockMap.get(BlockTypes.LEAVES).push({ x: x + dx, y: crownTop, z: z + dz });
                }
            }
            if (rng() > 0.4) {
                blockMap.get(BlockTypes.LEAVES).push({ x, y: crownTop + 1, z });
                if (rng() > 0.5) blockMap.get(BlockTypes.LEAVES).push({ x: x + 1, y: crownTop + 1, z });
                if (rng() > 0.5) blockMap.get(BlockTypes.LEAVES).push({ x: x - 1, y: crownTop + 1, z });
            }
        }
    }

    // 花朵生成（提高密度）
    function placeFlowers(blockMap, surfaceInfo, seed) {
        const rng = mulberry32(seed + 99999);
        const flowerColors = [
            new THREE.Color('#ff6b6b'), new THREE.Color('#ffd93d'), new THREE.Color('#ff922b'),
            new THREE.Color('#f06595'), new THREE.Color('#e599f7'), new THREE.Color('#ffffff'),
            new THREE.Color('#51cf66'), new THREE.Color('#74c0fc'),
        ];
        for (const info of surfaceInfo) {
            const { x, z, height, surfaceType } = info;
            if (surfaceType !== BlockTypes.GRASS) continue;
            if (height < WATER_LEVEL + 1) continue;
            if (rng() > 0.08) continue; // 8% 概率生成花
            const color = flowerColors[Math.floor(rng() * flowerColors.length)];
            blockMap.get(BlockTypes.FLOWER).push({ x, y: height + 1, z, color });
        }
    }

    // 云
    function placeClouds(blockMap, seed) {
        const cloudRng = mulberry32(seed + 12345);
        const cloudY = 19;
        const cloudExtent = HALF_SIZE + 8;
        for (let ix = -cloudExtent; ix <= cloudExtent; ix++) {
            for (let iz = -cloudExtent; iz <= cloudExtent; iz++) {
                const noiseVal = fbmNoise(ix * 0.35, iz * 0.35, seed + 88888, 4);
                if (noiseVal > 0.5 && cloudRng() < (noiseVal - 0.5) * 1.2) {
                    blockMap.get(BlockTypes.CLOUD).push({ x: ix, y: cloudY, z: iz });
                    if (cloudRng() < 0.3 && noiseVal > 0.65) {
                        blockMap.get(BlockTypes.CLOUD).push({ x: ix, y: cloudY + 1, z: iz });
                    }
                }
            }
        }
    }

    // 创建 InstancedMesh
    function createInstancedMeshes(blockMap) {
        const meshes = [];
        for (const [type, blocks] of blockMap) {
            if (blocks.length === 0) continue;
            const colorHex = blockColors[type];
            const preset = blockMaterialPresets[type] || {};
            let material;
            if (type === BlockTypes.WATER) {
                material = new THREE.MeshStandardMaterial({
                    color: new THREE.Color(colorHex), roughness: 0.2, metalness: 0.1,
                    transparent: true, opacity: 0.7, depthWrite: true,
                });
            } else if (type === BlockTypes.CLOUD) {
                material = new THREE.MeshStandardMaterial({
                    color: new THREE.Color(colorHex), roughness: 0.3, metalness: 0.0,
                    transparent: true, opacity: 0.82, depthWrite: true,
                });
            } else if (type === BlockTypes.FLOWER) {
                material = new THREE.MeshStandardMaterial({ color: new THREE.Color('#ffffff'), roughness: 0.6 });
            } else {
                material = new THREE.MeshStandardMaterial({
                    color: new THREE.Color(colorHex),
                    roughness: preset.roughness ?? 0.7,
                    metalness: preset.metalness ?? 0.0,
                });
            }

            const instancedMesh = new THREE.InstancedMesh(sharedGeometry, material, blocks.length);
            instancedMesh.castShadow = true;
            instancedMesh.receiveShadow = true;
            if (type === BlockTypes.WATER || type === BlockTypes.CLOUD) instancedMesh.renderOrder = 1;

            const dummy = new THREE.Object3D();
            for (let i = 0; i < blocks.length; i++) {
                const b = blocks[i];
                dummy.position.set(b.x, b.y, b.z);
                dummy.scale.set(1, 1, 1);
                dummy.updateMatrix();
                instancedMesh.setMatrixAt(i, dummy.matrix);
                if (type === BlockTypes.FLOWER && b.color) instancedMesh.setColorAt(i, b.color);
            }
            instancedMesh.instanceMatrix.needsUpdate = true;
            if (type === BlockTypes.FLOWER && blocks.length > 0 && blocks[0].color) instancedMesh.instanceColor.needsUpdate = true;
            meshes.push(instancedMesh);
        }
        return meshes;
    }

    function clearTerrain() {
        for (const mesh of terrainMeshes) {
            if (mesh.geometry && mesh.geometry !== sharedGeometry) mesh.geometry.dispose();
            if (mesh.material) mesh.material.dispose();
            scene.remove(mesh);
        }
        terrainMeshes = [];
    }

    function generateTerrain(seed) {
        clearTerrain();
        const { blockMap, surfaceInfo } = collectBlocks(seed);
        placeTrees(blockMap, surfaceInfo, seed);
        placeFlowers(blockMap, surfaceInfo, seed);
        placeClouds(blockMap, seed);
        terrainMeshes = createInstancedMeshes(blockMap);
        for (const mesh of terrainMeshes) scene.add(mesh);
        seedText.textContent = seed;

        let totalBlocks = 0;
        for (const blocks of blockMap.values()) totalBlocks += blocks.length;
        console.log(`🌍 种子 ${seed} | 方块总数: ${totalBlocks} | 包含草地、泥土、树木、花朵、矿石`);
    }

    let currentSeed = Math.floor(Math.random() * 1000000);
    generateTerrain(currentSeed);

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        const time = performance.now() * 0.0001;
        sunLight.position.x = 25 + Math.sin(time * 0.3) * 8;
        sunLight.position.z = 15 + Math.cos(time * 0.3) * 8;
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = container.clientWidth / container.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(container.clientWidth, container.clientHeight);
    });

    btnRegen.addEventListener('click', () => { generateTerrain(currentSeed); });
    btnRandom.addEventListener('click', () => {
        currentSeed = Math.floor(Math.random() * 1000000);
        generateTerrain(currentSeed);
    });
    btnReset.addEventListener('click', () => {
        const startPos = camera.position.clone();
        const startTarget = controls.target.clone();
        const targetPos = new THREE.Vector3(35, 24, 35);
        const targetLook = new THREE.Vector3(0, 6, 0);
        const startTime = performance.now();
        function anim(now) {
            const t = Math.min((now - startTime) / 800, 1);
            const ease = t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2;
            camera.position.lerpVectors(startPos, targetPos, ease);
            controls.target.lerpVectors(startTarget, targetLook, ease);
            controls.update();
            if (t < 1) requestAnimationFrame(anim);
        }
        requestAnimationFrame(anim);
        controls.autoRotate = true;
    });

    window.addEventListener('keydown', (e) => {
        if (e.key.toLowerCase() === 'r') {
            currentSeed = Math.floor(Math.random() * 1000000);
            generateTerrain(currentSeed);
        } else if (e.key.toLowerCase() === 'g') {
            generateTerrain(currentSeed);
        } else if (e.key.toLowerCase() === 'f') {
            controls.target.set(0, 6, 0);
            camera.position.set(35, 24, 35);
            controls.update();
        } else if (e.key.toLowerCase() === 'a') {
            controls.autoRotate = !controls.autoRotate;
        }
    });

    console.log('✅ 修复版地形已加载！现在包含：草地、泥土、树木、花朵、煤矿、铁矿');
</script>
</body>
</html>
