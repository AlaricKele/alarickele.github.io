<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的世界风格 - 无限地形（不消失）</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --panel-bg: rgba(20,20,40,0.85);
            --text: #e0e0e0;
            --accent: #5cb85c;
            --accent2: #f0ad4e;
        }
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            background:var(--bg);overflow:hidden;
            font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
            height:100vh;width:100vw;user-select:none;-webkit-user-select:none;
            -webkit-tap-highlight-color:transparent;cursor:grab;
        }
        body:active{cursor:grabbing;}
        #canvas-container{position:fixed;inset:0;z-index:1;}
        canvas{display:block;}

        #info-panel{
            position:fixed;top:16px;left:50%;transform:translateX(-50%);
            z-index:10;background:var(--panel-bg);
            border:1px solid rgba(255,255,255,0.2);border-radius:20px;
            padding:10px 22px;display:flex;align-items:center;gap:14px;
            backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
            box-shadow:0 8px 32px rgba(0,0,0,0.3);pointer-events:auto;
        }
        #info-panel .dot{width:10px;height:10px;border-radius:50%;background:#6ab04c;box-shadow:0 0 8px #6ab04c;}
        #info-panel span{color:var(--text);font-size:13px;letter-spacing:0.5px;}
        #info-panel .seed-display{color:#ffda79;font-weight:600;}

        #btn-group{
            position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
            z-index:10;display:flex;gap:12px;pointer-events:auto;
        }
        .btn{
            padding:12px 24px;border-radius:28px;border:none;
            font-size:14px;font-weight:600;cursor:pointer;letter-spacing:0.5px;
            transition:all 0.25s ease;backdrop-filter:blur(12px);
            -webkit-backdrop-filter:blur(12px);box-shadow:0 6px 20px rgba(0,0,0,0.3);
            outline:none;font-family:inherit;
        }
        .btn-regenerate{background:var(--accent);color:#fff;}
        .btn-regenerate:hover{background:#4cae4c;transform:translateY(-2px);}
        .btn-random{background:var(--accent2);color:#333;}
        .btn-random:hover{background:#ec971f;transform:translateY(-2px);}
        .btn-reset{background:rgba(255,255,255,0.1);color:#ccc;}
        .btn-reset:hover{background:rgba(255,255,255,0.2);color:#fff;transform:translateY(-2px);}
        .btn:active{transform:scale(0.96);}

        #legend{
            position:fixed;right:16px;top:50%;transform:translateY(-50%);
            z-index:10;background:var(--panel-bg);border-radius:16px;
            padding:14px 16px;border:1px solid rgba(255,255,255,0.15);
            backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
            box-shadow:0 6px 20px rgba(0,0,0,0.25);
            display:flex;flex-direction:column;gap:7px;
        }
        #legend .item{display:flex;align-items:center;gap:8px;font-size:11px;color:#ccc;}
        #legend .swatch{width:16px;height:16px;border-radius:3px;border:1px solid rgba(255,255,255,0.3);}
        @media(max-width:768px){
            #legend{right:4px;padding:8px 10px;gap:4px;}
            #legend .item{font-size:10px;}
            .btn{padding:10px 16px;font-size:12px;}
        }
    </style>
</head>
<body>
<div id="canvas-container"></div>

<div id="info-panel">
    <span class="dot"></span>
    <span>地形种子:</span>
    <span class="seed-display" id="seed-text">---</span>
    <span style="margin-left:10px;">| 已加载区块:</span>
    <span class="seed-display" id="chunk-count">0</span>
</div>

<div id="legend">
    <div class="item"><span class="swatch" style="background:#4a7d2e;"></span> 草地</div>
    <div class="item"><span class="swatch" style="background:#6b4e0a;"></span> 泥土</div>
    <div class="item"><span class="swatch" style="background:#6b6b6b;"></span> 石头</div>
    <div class="item"><span class="swatch" style="background:#a68a3a;"></span> 沙地</div>
    <div class="item"><span class="swatch" style="background:#e0e0e0;"></span> 雪</div>
    <div class="item"><span class="swatch" style="background:#2255aa;"></span> 水</div>
    <div class="item"><span class="swatch" style="background:#2d5a2d;"></span> 树叶</div>
    <div class="item"><span class="swatch" style="background:#333333;"></span> 煤矿</div>
    <div class="item"><span class="swatch" style="background:#b87d4a;"></span> 铁矿</div>
</div>

<div id="btn-group">
    <button class="btn btn-regenerate" id="btn-regen">🔄 重新生成</button>
    <button class="btn btn-random" id="btn-random">🎲 随机地形</button>
    <button class="btn btn-reset" id="btn-reset">🏠 重置视角</button>
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const container = document.getElementById('canvas-container');
    const seedText = document.getElementById('seed-text');
    const chunkCountEl = document.getElementById('chunk-count');
    const btnRegen = document.getElementById('btn-regen');
    const btnRandom = document.getElementById('btn-random');
    const btnReset = document.getElementById('btn-reset');

    // 场景
    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#8ecafc');
    scene.fog = new THREE.Fog('#b0d8f8', 50, 150);

    const camera = new THREE.PerspectiveCamera(50, container.clientWidth/container.clientHeight, 1, 300);
    camera.position.set(30, 20, 30);
    camera.lookAt(0, 5, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.0;
    container.appendChild(renderer.domElement);

    // 控制器：关闭自动旋转
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 6, 0);
    controls.enableDamping = true;
    controls.dampingFactor = 0.12;
    controls.minDistance = 6;
    controls.maxDistance = 150;
    controls.maxPolarAngle = Math.PI * 0.5;
    controls.minPolarAngle = 0.1;
    controls.autoRotate = false;  // 不自动旋转
    controls.autoRotateSpeed = 0.3;
    controls.update();

    // 光照
    const ambientLight = new THREE.AmbientLight('#8899bb', 1.2);
    scene.add(ambientLight);
    const hemiLight = new THREE.HemisphereLight('#ffffff', '#5577aa', 0.7);
    scene.add(hemiLight);
    const sunLight = new THREE.DirectionalLight('#ffffff', 3.8);
    sunLight.position.set(30, 40, 20);
    sunLight.castShadow = true;
    sunLight.shadow.mapSize.width = 2048;
    sunLight.shadow.mapSize.height = 2048;
    sunLight.shadow.camera.near = 0.5;
    sunLight.shadow.camera.far = 150;
    sunLight.shadow.camera.left = -60;
    sunLight.shadow.camera.right = 60;
    sunLight.shadow.camera.top = 60;
    sunLight.shadow.camera.bottom = -60;
    sunLight.shadow.bias = -0.0002;
    scene.add(sunLight);

    // ---------- 纹理生成 ----------
    function createTexture(size, drawFunc) {
        const canvas = document.createElement('canvas');
        canvas.width = size; canvas.height = size;
        drawFunc(canvas.getContext('2d'), size);
        const tex = new THREE.CanvasTexture(canvas);
        tex.magFilter = THREE.NearestFilter;
        tex.minFilter = THREE.NearestFilter;
        tex.wrapS = THREE.RepeatWrapping;
        tex.wrapT = THREE.RepeatWrapping;
        return tex;
    }
    function fill(ctx,x,y,w,h,c){ ctx.fillStyle=c; ctx.fillRect(x,y,w,h); }

    const stoneTex = () => createTexture(16,(ctx,s)=>{
        fill(ctx,0,0,s,s,'#6b6b6b');
        ctx.fillStyle='#505050';
        ctx.fillRect(2,5,2,6); ctx.fillRect(7,2,1,12);
        ctx.fillRect(12,1,2,3); ctx.fillRect(10,8,3,2);
        ctx.fillRect(4,11,5,1); ctx.fillRect(14,7,1,5);
        ctx.fillStyle='#404040'; ctx.fillRect(5,3,1,1); ctx.fillRect(8,10,1,1);
    });
    const dirtTex = () => createTexture(16,(ctx,s)=>{
        fill(ctx,0,0,s,s,'#6b4e0a');
        ctx.fillStyle='#4d3606';
        ctx.fillRect(3,2,2,2); ctx.fillRect(10,5,1,1);
        ctx.fillRect(6,9,3,2); ctx.fillRect(13,11,2,1);
        ctx.fillRect(1,7,1,2); ctx.fillRect(8,3,1,1); ctx.fillRect(14,4,1,1);
    });
    const grassTopTex = () => createTexture(16,(ctx,s)=>{
        fill(ctx,0,0,s,s,'#4a7d2e');
        ctx.fillStyle='#5e9e33';
        ctx.fillRect(2,3,2,1); ctx.fillRect(7,1,1,3);
        ctx.fillRect(11,5,3,1); ctx.fillRect(4,8,2,2);
        ctx.fillRect(13,10,1,2); ctx.fillRect(1,12,3,1);
        ctx.fillStyle='#6daa3a'; ctx.fillRect(9,13,1,1); ctx.fillRect(6,6,1,1);
    });
    const grassSideTex = () => createTexture(16,(ctx,s)=>{
        fill(ctx,0,0,s,s,'#6b4e0a');
        fill(ctx,0,0,s,3,'#4a7d2e');
        ctx.fillStyle='#5e9e33'; ctx.fillRect(2,1,2,1); ctx.fillRect(10,2,3,1);
        ctx.fillStyle='#4d3606'; ctx.fillRect(4,6,2,1); ctx.fillRect(11,8,1,2); ctx.fillRect(1,10,2,2);
    });
    const sandTex = () => createTexture(16,(ctx,s)=>{
        fill(ctx,0,0,s,s,'#a68a3a');
        ctx.fillStyle='#8f752f';
        ctx.fillRect(3,2,1,1); ctx.fillRect(7,5,2,1); ctx.fillRect(12,3,1,2);
        ctx.fillRect(5,9,1,1); ctx.fillRect(10,11,2,1); ctx.fillRect(1,7,1,1);
        ctx.fillStyle='#7a6227'; ctx.fillRect(13,8,1,1); ctx.fillRect(2,13,1,1);
    });
    const snowTex = () => createTexture(16,(ctx,s)=>{
        fill(ctx,0,0,s,s,'#e0e0e0');
        ctx.fillStyle='#c8d0d8';
        ctx.fillRect(4,2,1,1); ctx.fillRect(10,5,2,1); ctx.fillRect(2,8,1,2);
        ctx.fillRect(13,10,1,1); ctx.fillRect(7,12,2,1);
    });
    const waterTex = () => createTexture(16,(ctx,s)=>{
        fill(ctx,0,0,s,s,'#2255aa');
        ctx.fillStyle='#4488cc';
        ctx.fillRect(2,4,4,1); ctx.fillRect(9,8,5,1); ctx.fillRect(1,12,6,1);
        ctx.fillRect(6,14,5,1); ctx.fillStyle='#ffffff';
        ctx.fillRect(4,6,2,1); ctx.fillRect(11,2,1,1);
    });
    const leavesTex = () => createTexture(16,(ctx,s)=>{
        fill(ctx,0,0,s,s,'#2d5a2d');
        ctx.fillStyle='#3a7a3a';
        ctx.fillRect(2,2,3,2); ctx.fillRect(8,1,4,3); ctx.fillRect(5,6,2,2);
        ctx.fillRect(11,7,3,2); ctx.fillRect(1,10,4,2); ctx.fillRect(7,12,5,2);
        ctx.fillStyle='#1f401f'; ctx.fillRect(3,5,1,1); ctx.fillRect(10,9,1,1);
        ctx.fillRect(2,11,1,1); ctx.fillRect(8,4,1,1);
    });
    const woodTex = () => createTexture(16,(ctx,s)=>{
        fill(ctx,0,0,s,s,'#6b3f1f');
        ctx.fillStyle='#4d2b12';
        ctx.fillRect(0,2,s,1); ctx.fillRect(0,5,s,1); ctx.fillRect(0,8,s,1);
        ctx.fillRect(0,11,s,1); ctx.fillRect(0,14,s,1);
        ctx.fillStyle='#8b5a2b';
        ctx.fillRect(3,3,2,1); ctx.fillRect(10,6,3,1); ctx.fillRect(1,9,2,1);
        ctx.fillRect(8,12,4,1);
    });
    const coalOreTex = () => createTexture(16,(ctx,s)=>{
        fill(ctx,0,0,s,s,'#6b6b6b');
        ctx.fillStyle='#333333'; ctx.fillRect(4,3,3,3); ctx.fillRect(9,7,2,2);
        ctx.fillRect(2,9,2,3); ctx.fillRect(11,12,3,2);
        ctx.fillStyle='#505050'; ctx.fillRect(7,2,1,3); ctx.fillRect(13,5,2,1);
    });
    const ironOreTex = () => createTexture(16,(ctx,s)=>{
        fill(ctx,0,0,s,s,'#6b6b6b');
        ctx.fillStyle='#b87d4a'; ctx.fillRect(3,4,2,2); ctx.fillRect(10,3,2,3);
        ctx.fillRect(6,9,3,2); ctx.fillRect(12,11,2,2);
        ctx.fillStyle='#505050'; ctx.fillRect(5,2,1,4); ctx.fillRect(14,7,1,3);
    });
    const bedrockTex = () => createTexture(16,(ctx,s)=>{
        fill(ctx,0,0,s,s,'#2a2a2a');
        ctx.fillStyle='#1a1a1a'; ctx.fillRect(2,3,3,2); ctx.fillRect(8,6,2,3);
        ctx.fillRect(12,2,2,2); ctx.fillRect(4,9,4,2); ctx.fillRect(1,13,3,2);
    });
    const flowerTex = (c) => createTexture(8,(ctx,s)=>{
        fill(ctx,0,0,s,s,'#4a7d2e');
        ctx.fillStyle=c; ctx.fillRect(2,2,4,4);
        ctx.fillStyle='#ffffff'; ctx.fillRect(3,3,2,2);
    });

    const BlockTypes = {
        BEDROCK:'bedrock', STONE:'stone', DIRT:'dirt', GRASS:'grass',
        SAND:'sand', SNOW:'snow', WATER:'water', WOOD:'wood',
        LEAVES:'leaves', FLOWER:'flower', COAL_ORE:'coal_ore', IRON_ORE:'iron_ore'
    };

    const texCache = new Map();
    function getMaterial(type, flowerColor=null) {
        if(type===BlockTypes.GRASS) {
            if(!texCache.has('grassMats')) texCache.set('grassMats', [
                new THREE.MeshStandardMaterial({map:grassSideTex(), roughness:0.7}),
                new THREE.MeshStandardMaterial({map:grassSideTex(), roughness:0.7}),
                new THREE.MeshStandardMaterial({map:grassTopTex(), roughness:0.7}),
                new THREE.MeshStandardMaterial({map:dirtTex(), roughness:0.8}),
                new THREE.MeshStandardMaterial({map:grassSideTex(), roughness:0.7}),
                new THREE.MeshStandardMaterial({map:grassSideTex(), roughness:0.7}),
            ]);
            return texCache.get('grassMats');
        }
        if(type===BlockTypes.WATER) {
            if(!texCache.has('water')) {
                const mat = new THREE.MeshStandardMaterial({map:waterTex(), transparent:true, opacity:0.65, roughness:0.1});
                mat.renderOrder=1; texCache.set('water', mat);
            }
            return texCache.get('water');
        }
        if(type===BlockTypes.FLOWER && flowerColor) {
            const key = `flower_${flowerColor}`;
            if(!texCache.has(key)) texCache.set(key, new THREE.MeshStandardMaterial({map:flowerTex(flowerColor), roughness:0.6}));
            return texCache.get(key);
        }
        if(!texCache.has(type)) {
            let tex;
            switch(type) {
                case BlockTypes.STONE: tex=stoneTex(); break;
                case BlockTypes.DIRT: tex=dirtTex(); break;
                case BlockTypes.SAND: tex=sandTex(); break;
                case BlockTypes.SNOW: tex=snowTex(); break;
                case BlockTypes.WOOD: tex=woodTex(); break;
                case BlockTypes.LEAVES: tex=leavesTex(); break;
                case BlockTypes.COAL_ORE: tex=coalOreTex(); break;
                case BlockTypes.IRON_ORE: tex=ironOreTex(); break;
                case BlockTypes.BEDROCK: tex=bedrockTex(); break;
                default: tex=stoneTex();
            }
            texCache.set(type, new THREE.MeshStandardMaterial({map:tex, roughness:0.7}));
        }
        return texCache.get(type);
    }

    // 区块参数
    const CHUNK_SIZE = 16;
    const WATER_LV = 3;
    const SNOW_LINE = 15;
    const STONE_LINE = 12;

    // 噪声
    function hash2D(x,z,s){ const n = Math.sin(x*127.1+z*311.7+s*43758.5453)*43758.5453; return n-Math.floor(n); }
    function smoothNoise2D(x,z,s){
        const ix=Math.floor(x),iz=Math.floor(z),fx=x-ix,fz=z-iz;
        const sx=fx*fx*(3-2*fx),sz=fz*fz*(3-2*fz);
        const v00=hash2D(ix,iz,s),v10=hash2D(ix+1,iz,s),v01=hash2D(ix,iz+1,s),v11=hash2D(ix+1,iz+1,s);
        return v00+(v10-v00)*sx + (v01+(v11-v01)*sx - (v00+(v10-v00)*sx))*sz;
    }
    function fbm(x,z,s,o=6){ let v=0,a=1,f=1,m=0; for(let i=0;i<o;i++){ v+=a*smoothNoise2D(x*f,z*f,s+i*1000); m+=a; a*=0.5; f*=2; } return v/m; }
    function moist(x,z,s){ return fbm(x*0.7+5.3,z*0.7-3.1,s+50000,4); }
    function mulberry32(a){ return function(){ a|=0; a=a+0x6d2b79f5|0; let t=Math.imul(a^a>>>15,1|a); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }

    // 区块管理
    const loadedChunks = new Map(); // key "cx,cz" -> THREE.Group
    const geo = new THREE.BoxGeometry(1,1,1);

    function getChunkKey(cx, cz) { return `${cx},${cz}`; }

    function generateChunkData(cx, cz, seed) {
        const map = new Map();
        for(let t of Object.values(BlockTypes)) map.set(t, []);
        const info = [];
        const baseX = cx * CHUNK_SIZE;
        const baseZ = cz * CHUNK_SIZE;
        for(let ix=0; ix<CHUNK_SIZE; ix++) {
            for(let iz=0; iz<CHUNK_SIZE; iz++) {
                const wx = baseX + ix;
                const wz = baseZ + iz;
                const hRaw = fbm(wx*0.12, wz*0.12, seed, 7)*9+7;
                const h = Math.max(1, Math.min(19, Math.round(hRaw)));
                const m = (moist(wx,wz,seed)+1)/2;
                let surface;
                if(h<=WATER_LV+1) surface=BlockTypes.SAND;
                else if(h>=SNOW_LINE) surface=BlockTypes.SNOW;
                else if(h>=STONE_LINE) surface=BlockTypes.STONE;
                else if(m<0.12) surface=BlockTypes.SAND;
                else surface=BlockTypes.GRASS;

                map.get(BlockTypes.BEDROCK).push({x:wx,y:0,z:wz});
                const stoneTop = Math.max(1, h-4);
                for(let y=1; y<stoneTop; y++) {
                    const rng = mulberry32(seed+wx*1000+wz*100+y*10);
                    const rc = rng();
                    if(rc<0.06) map.get(BlockTypes.COAL_ORE).push({x:wx,y,z:wz});
                    else if(rc<0.09) map.get(BlockTypes.IRON_ORE).push({x:wx,y,z:wz});
                    else map.get(BlockTypes.STONE).push({x:wx,y,z:wz});
                }
                for(let y=stoneTop; y<h; y++) map.get(BlockTypes.DIRT).push({x:wx,y,z:wz});
                map.get(surface).push({x:wx,y:h,z:wz});
                if(h<WATER_LV) map.get(BlockTypes.WATER).push({x:wx,y:WATER_LV,z:wz});
                info.push({x:wx,z:wz,height:h,surface,moisture:m});
            }
        }
        return {map, info};
    }

    function addTreesAndFlowers(map, info, seed) {
        const rng = mulberry32(seed+77777);
        for(const t of info) {
            if(t.surface!==BlockTypes.GRASS||t.height<WATER_LV+2||t.moisture<0.15||rng()>0.18) continue;
            const trunkH = 2+Math.floor(rng()*4);
            for(let y=t.height+1; y<=t.height+trunkH; y++) map.get(BlockTypes.WOOD).push({x:t.x,y,z:t.z});
            const cb = t.height+trunkH;
            for(let dx=-1;dx<=1;dx++) for(let dz=-1;dz<=1;dz++) if(dx||dz) map.get(BlockTypes.LEAVES).push({x:t.x+dx,y:cb,z:t.z+dz});
            const ct = cb+1;
            for(let dx=-1;dx<=1;dx++) for(let dz=-1;dz<=1;dz++) {
                if(Math.abs(dx)===1&&Math.abs(dz)===1&&rng()>0.5) continue;
                map.get(BlockTypes.LEAVES).push({x:t.x+dx,y:ct,z:t.z+dz});
            }
            if(rng()>0.4) {
                map.get(BlockTypes.LEAVES).push({x:t.x,y:ct+1,z:t.z});
                if(rng()>0.5) map.get(BlockTypes.LEAVES).push({x:t.x+1,y:ct+1,z:t.z});
                if(rng()>0.5) map.get(BlockTypes.LEAVES).push({x:t.x-1,y:ct+1,z:t.z});
            }
        }
        const flowerRng = mulberry32(seed+99999);
        const colors = ['#cc4444','#ccaa22','#cc6622','#cc4477','#bb66cc','#ffffff','#44aa44','#5599cc'];
        for(const t of info) {
            if(t.surface!==BlockTypes.GRASS||t.height<WATER_LV+1||flowerRng()>0.08) continue;
            map.get(BlockTypes.FLOWER).push({x:t.x, y:t.height+1, z:t.z, color:colors[Math.floor(flowerRng()*colors.length)]});
        }
    }

    function buildChunkGroup(blockMap) {
        const group = new THREE.Group();
        for(const [type, blocks] of blockMap) {
            if(!blocks.length) continue;
            let mat;
            if(type===BlockTypes.FLOWER) mat = getMaterial(type, blocks[0].color);
            else mat = getMaterial(type);
            const inst = new THREE.InstancedMesh(geo, mat, blocks.length);
            inst.castShadow = true;
            inst.receiveShadow = true;
            const dummy = new THREE.Object3D();
            for(let i=0; i<blocks.length; i++) {
                dummy.position.set(blocks[i].x, blocks[i].y, blocks[i].z);
                dummy.updateMatrix();
                inst.setMatrixAt(i, dummy.matrix);
            }
            inst.instanceMatrix.needsUpdate = true;
            group.add(inst);
        }
        return group;
    }

    function loadChunk(cx, cz, seed) {
        const key = getChunkKey(cx, cz);
        if(loadedChunks.has(key)) return;
        const {map, info} = generateChunkData(cx, cz, seed);
        addTreesAndFlowers(map, info, seed);
        const group = buildChunkGroup(map);
        loadedChunks.set(key, group);
        scene.add(group);
    }

    function clearAllChunks() {
        for(const [key, group] of loadedChunks) {
            scene.remove(group);
            group.traverse(child => {
                if(child.geometry && child.geometry!==geo) child.geometry.dispose();
                if(child.material) {
                    if(Array.isArray(child.material)) child.material.forEach(m=>m.dispose());
                    else child.material.dispose();
                }
            });
        }
        loadedChunks.clear();
    }

    let currentSeed = Math.floor(Math.random()*1000000);
    const loadRadius = 3;

    function updateChunks() {
        const camX = camera.position.x;
        const camZ = camera.position.z;
        const centerCX = Math.round(camX / CHUNK_SIZE);
        const centerCZ = Math.round(camZ / CHUNK_SIZE);

        for(let dx = -loadRadius; dx <= loadRadius; dx++) {
            for(let dz = -loadRadius; dz <= loadRadius; dz++) {
                const cx = centerCX + dx;
                const cz = centerCZ + dz;
                if(!loadedChunks.has(getChunkKey(cx, cz))) {
                    loadChunk(cx, cz, currentSeed);
                }
            }
        }

        chunkCountEl.textContent = loadedChunks.size;
    }

    function fullReload(seed) {
        currentSeed = seed;
        clearAllChunks();
        updateChunks();
        seedText.textContent = seed;
    }

    function updateAtmosphere() {
        const dist = camera.position.distanceTo(controls.target);
        const maxDist = controls.maxDistance;
        const t = Math.min(dist / maxDist, 1.0);

        scene.fog.near = 40 - t * 20;
        scene.fog.far = 100 + t * 80;

        ambientLight.intensity = 1.2 - t * 0.6;
        hemiLight.intensity = 0.7 - t * 0.3;
        sunLight.intensity = 3.8 - t * 1.5;

        const fogColor = new THREE.Color('#b0d8f8').lerp(new THREE.Color('#8aaccc'), t);
        scene.fog.color = fogColor;
        scene.background = fogColor;
    }

    // 初始化
    fullReload(currentSeed);

    function animate() {
        requestAnimationFrame(animate);

        controls.update();
        updateChunks();
        updateAtmosphere();

        // 太阳缓慢移动
        const time = Date.now() * 0.0005;
        sunLight.position.x = 30 + Math.sin(time) * 15;
        sunLight.position.z = 20 + Math.cos(time) * 15;

        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', ()=>{
        camera.aspect = container.clientWidth/container.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(container.clientWidth, container.clientHeight);
    });

    btnRegen.addEventListener('click', ()=> fullReload(currentSeed));
    btnRandom.addEventListener('click', ()=>{
        currentSeed = Math.floor(Math.random()*1000000);
        fullReload(currentSeed);
    });
    btnReset.addEventListener('click', ()=>{
        controls.target.set(0, 6, 0);
        camera.position.set(30, 20, 30);
        controls.update();
    });

    window.addEventListener('keydown', e=>{
        if(e.key==='r') { currentSeed=Math.floor(Math.random()*1000000); fullReload(currentSeed); }
        else if(e.key==='g') fullReload(currentSeed);
        else if(e.key==='f') { controls.target.set(0,6,0); camera.position.set(30,20,30); controls.update(); }
    });
</script>
</body>
</html>
