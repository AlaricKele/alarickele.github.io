<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MC地形 · 3D地形生成器</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'PingFang SC', sans-serif;
            background: #1a1a2e;
        }
        .nav {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 20;
        }
        .nav a {
            color: #ffda79;
            text-decoration: none;
            font-size: 14px;
            padding: 6px 12px;
            background: rgba(0,0,0,0.4);
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .nav a:hover {
            background: rgba(255,255,255,0.15);
        }
        #info {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20,20,40,0.85);
            color: #e0e0e0;
            padding: 10px 24px;
            border-radius: 30px;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.2);
            display: flex;
            gap: 20px;
            font-size: 14px;
            z-index: 10;
        }
        #info span { color: #ffda79; font-weight: 600; }
        .btn-group {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            z-index: 10;
        }
        button {
            padding: 12px 24px;
            border-radius: 30px;
            border: none;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            backdrop-filter: blur(10px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
            transition: 0.2s;
            background: #5cb85c;
            color: white;
        }
        button.random { background: #f0ad4e; color: #333; }
        button.reset { background: rgba(255,255,255,0.1); color: #ccc; }
        button:hover { transform: translateY(-2px); }
        #legend {
            position: fixed;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(20,20,40,0.85);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            padding: 14px 16px;
            border: 1px solid rgba(255,255,255,0.15);
            color: #ccc;
            font-size: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 10;
        }
        .legend-item { display: flex; align-items: center; gap: 8px; }
        .swatch { width: 16px; height: 16px; border-radius: 3px; border: 1px solid rgba(255,255,255,0.4); }
    </style>
</head>
<body>
    <div class="nav">
        <a href="index.html">← 返回 解压玩具</a>
    </div>

    <div id="info">
        🌱种子 <span id="seed-text">------</span>
        📦区块 <span id="chunk-count">0</span>
        🌿草原 <span id="grass-ratio">~0%</span>
    </div>
    <div id="legend">
        <div class="legend-item"><div class="swatch" style="background:#4a7d2e;"></div> 草地</div>
        <div class="legend-item"><div class="swatch" style="background:#6b4e0a;"></div> 泥土</div>
        <div class="legend-item"><div class="swatch" style="background:#6b6b6b;"></div> 石头</div>
        <div class="legend-item"><div class="swatch" style="background:#a68a3a;"></div> 沙地</div>
        <div class="legend-item"><div class="swatch" style="background:#e0e0e0;"></div> 雪</div>
        <div class="legend-item"><div class="swatch" style="background:#2255aa;"></div> 水</div>
        <div class="legend-item"><div class="swatch" style="background:#2d5a2d;"></div> 树叶</div>
        <div class="legend-item"><div class="swatch" style="background:#333333;"></div> 煤矿</div>
        <div class="legend-item"><div class="swatch" style="background:#b87d4a;"></div> 铁矿</div>
    </div>
    <div class="btn-group">
        <button id="btn-regen">🔄 重新生成</button>
        <button id="btn-random" class="random">🎲 随机地形</button>
        <button id="btn-reset" class="reset">🏠 重置视角</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#8ecafc');
        scene.fog = new THREE.Fog('#b0d8f8', 90, 400);

        const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 1, 900);
        camera.position.set(70, 55, 70);
        camera.lookAt(0, 12, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(innerWidth, innerHeight);
        renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.1;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 12, 0);
        controls.enableDamping = true;
        controls.dampingFactor = 0.12;
        controls.minDistance = 15;
        controls.maxDistance = 350;
        controls.maxPolarAngle = Math.PI * 0.48;
        controls.minPolarAngle = 0.1;
        controls.autoRotate = false;
        controls.update();

        const ambient = new THREE.AmbientLight('#8899bb', 1.2);
        scene.add(ambient);
        const hemi = new THREE.HemisphereLight('#ffffff', '#5577aa', 0.7);
        scene.add(hemi);
        const sun = new THREE.DirectionalLight('#ffffff', 3.5);
        sun.position.set(70, 80, 50);
        sun.castShadow = true;
        sun.shadow.mapSize.width = 2048;
        sun.shadow.mapSize.height = 2048;
        sun.shadow.camera.near = 0.5;
        sun.shadow.camera.far = 500;
        sun.shadow.camera.left = -90;
        sun.shadow.camera.right = 90;
        sun.shadow.camera.top = 90;
        sun.shadow.camera.bottom = -90;
        sun.shadow.bias = -0.0003;
        scene.add(sun);

        function createTex(size, draw) {
            const c = document.createElement('canvas');
            c.width = size; c.height = size;
            draw(c.getContext('2d'), size);
            const t = new THREE.CanvasTexture(c);
            t.magFilter = THREE.NearestFilter;
            t.minFilter = THREE.NearestFilter;
            t.wrapS = THREE.RepeatWrapping;
            t.wrapT = THREE.RepeatWrapping;
            return t;
        }
        function fill(ctx, x, y, w, h, col) { ctx.fillStyle = col; ctx.fillRect(x, y, w, h); }

        const texStone = () => createTex(16, (ctx, s) => { fill(ctx, 0, 0, s, s, '#6b6b6b'); ctx.fillStyle = '#505050'; ctx.fillRect(2, 5, 2, 6); ctx.fillRect(7, 2, 1, 12); ctx.fillRect(12, 1, 2, 3); ctx.fillRect(10, 8, 3, 2); ctx.fillRect(4, 11, 5, 1); ctx.fillRect(14, 7, 1, 5); ctx.fillStyle = '#404040'; ctx.fillRect(5, 3, 1, 1); ctx.fillRect(8, 10, 1, 1); });
        const texDirt = () => createTex(16, (ctx, s) => { fill(ctx, 0, 0, s, s, '#6b4e0a'); ctx.fillStyle = '#4d3606'; ctx.fillRect(3, 2, 2, 2); ctx.fillRect(10, 5, 1, 1); ctx.fillRect(6, 9, 3, 2); ctx.fillRect(13, 11, 2, 1); ctx.fillRect(1, 7, 1, 2); ctx.fillRect(8, 3, 1, 1); ctx.fillRect(14, 4, 1, 1); });
        const texGrassTop = () => createTex(16, (ctx, s) => { fill(ctx, 0, 0, s, s, '#4a7d2e'); ctx.fillStyle = '#5e9e33'; ctx.fillRect(2, 3, 2, 1); ctx.fillRect(7, 1, 1, 3); ctx.fillRect(11, 5, 3, 1); ctx.fillRect(4, 8, 2, 2); ctx.fillRect(13, 10, 1, 2); ctx.fillRect(1, 12, 3, 1); ctx.fillStyle = '#6daa3a'; ctx.fillRect(9, 13, 1, 1); ctx.fillRect(6, 6, 1, 1); ctx.fillStyle = '#7ec850'; ctx.fillRect(10, 0, 1, 1); ctx.fillRect(0, 5, 1, 1); });
        const texGrassSide = () => createTex(16, (ctx, s) => { fill(ctx, 0, 0, s, s, '#6b4e0a'); fill(ctx, 0, 0, s, 3, '#4a7d2e'); ctx.fillStyle = '#5e9e33'; ctx.fillRect(2, 1, 2, 1); ctx.fillRect(10, 2, 3, 1); ctx.fillStyle = '#6daa3a'; ctx.fillRect(6, 0, 2, 1); ctx.fillStyle = '#4d3606'; ctx.fillRect(4, 6, 2, 1); ctx.fillRect(11, 8, 1, 2); ctx.fillRect(1, 10, 2, 2); });
        const texSand = () => createTex(16, (ctx, s) => { fill(ctx, 0, 0, s, s, '#a68a3a'); ctx.fillStyle = '#8f752f'; ctx.fillRect(3, 2, 1, 1); ctx.fillRect(7, 5, 2, 1); ctx.fillRect(12, 3, 1, 2); ctx.fillRect(5, 9, 1, 1); ctx.fillRect(10, 11, 2, 1); ctx.fillRect(1, 7, 1, 1); ctx.fillStyle = '#7a6227'; ctx.fillRect(13, 8, 1, 1); ctx.fillRect(2, 13, 1, 1); });
        const texSnow = () => createTex(16, (ctx, s) => { fill(ctx, 0, 0, s, s, '#e0e0e0'); ctx.fillStyle = '#c8d0d8'; ctx.fillRect(4, 2, 1, 1); ctx.fillRect(10, 5, 2, 1); ctx.fillRect(2, 8, 1, 2); ctx.fillRect(13, 10, 1, 1); ctx.fillRect(7, 12, 2, 1); });
        const texWater = () => createTex(16, (ctx, s) => { fill(ctx, 0, 0, s, s, '#2255aa'); ctx.fillStyle = '#4488cc'; ctx.fillRect(2, 4, 4, 1); ctx.fillRect(9, 8, 5, 1); ctx.fillRect(1, 12, 6, 1); ctx.fillRect(6, 14, 5, 1); ctx.fillStyle = '#ffffff'; ctx.fillRect(4, 6, 2, 1); ctx.fillRect(11, 2, 1, 1); });
        const texLeaves = () => createTex(16, (ctx, s) => { fill(ctx, 0, 0, s, s, '#2d5a2d'); ctx.fillStyle = '#3a7a3a'; ctx.fillRect(2, 2, 3, 2); ctx.fillRect(8, 1, 4, 3); ctx.fillRect(5, 6, 2, 2); ctx.fillRect(11, 7, 3, 2); ctx.fillRect(1, 10, 4, 2); ctx.fillRect(7, 12, 5, 2); ctx.fillStyle = '#1f401f'; ctx.fillRect(3, 5, 1, 1); ctx.fillRect(10, 9, 1, 1); ctx.fillRect(2, 11, 1, 1); ctx.fillRect(8, 4, 1, 1); });
        const texWood = () => createTex(16, (ctx, s) => { fill(ctx, 0, 0, s, s, '#6b3f1f'); ctx.fillStyle = '#4d2b12'; ctx.fillRect(0, 2, s, 1); ctx.fillRect(0, 5, s, 1); ctx.fillRect(0, 8, s, 1); ctx.fillRect(0, 11, s, 1); ctx.fillRect(0, 14, s, 1); ctx.fillStyle = '#8b5a2b'; ctx.fillRect(3, 3, 2, 1); ctx.fillRect(10, 6, 3, 1); ctx.fillRect(1, 9, 2, 1); ctx.fillRect(8, 12, 4, 1); });
        const texCoal = () => createTex(16, (ctx, s) => { fill(ctx, 0, 0, s, s, '#6b6b6b'); ctx.fillStyle = '#333333'; ctx.fillRect(4, 3, 3, 3); ctx.fillRect(9, 7, 2, 2); ctx.fillRect(2, 9, 2, 3); ctx.fillRect(11, 12, 3, 2); ctx.fillStyle = '#505050'; ctx.fillRect(7, 2, 1, 3); ctx.fillRect(13, 5, 2, 1); });
        const texIron = () => createTex(16, (ctx, s) => { fill(ctx, 0, 0, s, s, '#6b6b6b'); ctx.fillStyle = '#b87d4a'; ctx.fillRect(3, 4, 2, 2); ctx.fillRect(10, 3, 2, 3); ctx.fillRect(6, 9, 3, 2); ctx.fillRect(12, 11, 2, 2); ctx.fillStyle = '#505050'; ctx.fillRect(5, 2, 1, 4); ctx.fillRect(14, 7, 1, 3); });
        const texBedrock = () => createTex(16, (ctx, s) => { fill(ctx, 0, 0, s, s, '#2a2a2a'); ctx.fillStyle = '#1a1a1a'; ctx.fillRect(2, 3, 3, 2); ctx.fillRect(8, 6, 2, 3); ctx.fillRect(12, 2, 2, 2); ctx.fillRect(4, 9, 4, 2); ctx.fillRect(1, 13, 3, 2); });
        const texFlower = (col) => createTex(8, (ctx, s) => { fill(ctx, 0, 0, s, s, '#4a7d2e'); ctx.fillStyle = col; ctx.fillRect(3, 2, 2, 1); ctx.fillRect(3, 5, 2, 1); ctx.fillRect(2, 3, 1, 2); ctx.fillRect(5, 3, 1, 2); ctx.fillStyle = '#ffffff'; ctx.fillRect(3, 3, 2, 2); });

        const BlockTypes = {
            BEDROCK: 'bedrock', STONE: 'stone', DIRT: 'dirt', GRASS: 'grass',
            SAND: 'sand', SNOW: 'snow', WATER: 'water', WOOD: 'wood',
            LEAVES: 'leaves', FLOWER: 'flower', COAL: 'coal', IRON: 'iron'
        };

        const matCache = new Map();
        function getMat(type, flowerCol = null) {
            if (type === BlockTypes.GRASS) {
                if (!matCache.has('grass')) matCache.set('grass', [
                    new THREE.MeshStandardMaterial({ map: texGrassSide(), roughness: 0.7 }),
                    new THREE.MeshStandardMaterial({ map: texGrassSide(), roughness: 0.7 }),
                    new THREE.MeshStandardMaterial({ map: texGrassTop(), roughness: 0.7 }),
                    new THREE.MeshStandardMaterial({ map: texDirt(), roughness: 0.8 }),
                    new THREE.MeshStandardMaterial({ map: texGrassSide(), roughness: 0.7 }),
                    new THREE.MeshStandardMaterial({ map: texGrassSide(), roughness: 0.7 })
                ]);
                return matCache.get('grass');
            }
            if (type === BlockTypes.WATER) {
                if (!matCache.has('water')) {
                    const m = new THREE.MeshStandardMaterial({ map: texWater(), transparent: true, opacity: 0.65, roughness: 0.1 });
                    m.renderOrder = 1;
                    matCache.set('water', m);
                }
                return matCache.get('water');
            }
            if (type === BlockTypes.FLOWER && flowerCol) {
                const key = `flower_${flowerCol}`;
                if (!matCache.has(key)) matCache.set(key, new THREE.MeshStandardMaterial({ map: texFlower(flowerCol), roughness: 0.6 }));
                return matCache.get(key);
            }
            if (!matCache.has(type)) {
                let tex;
                switch (type) {
                    case BlockTypes.STONE: tex = texStone(); break;
                    case BlockTypes.DIRT: tex = texDirt(); break;
                    case BlockTypes.SAND: tex = texSand(); break;
                    case BlockTypes.SNOW: tex = texSnow(); break;
                    case BlockTypes.WOOD: tex = texWood(); break;
                    case BlockTypes.LEAVES: tex = texLeaves(); break;
                    case BlockTypes.COAL: tex = texCoal(); break;
                    case BlockTypes.IRON: tex = texIron(); break;
                    case BlockTypes.BEDROCK: tex = texBedrock(); break;
                    default: tex = texStone();
                }
                matCache.set(type, new THREE.MeshStandardMaterial({ map: tex, roughness: 0.7 }));
            }
            return matCache.get(type);
        }

        function hash(x, z, s) { const n = Math.sin(x * 127.1 + z * 311.7 + s * 43758.5453) * 43758.5453; return n - Math.floor(n); }
        function noise2D(x, z, s) {
            const ix = Math.floor(x), iz = Math.floor(z), fx = x - ix, fz = z - iz;
            const sx = fx * fx * (3 - 2 * fx), sz = fz * fz * (3 - 2 * fz);
            const v00 = hash(ix, iz, s), v10 = hash(ix + 1, iz, s), v01 = hash(ix, iz + 1, s), v11 = hash(ix + 1, iz + 1, s);
            return v00 + (v10 - v00) * sx + (v01 + (v11 - v01) * sx - (v00 + (v10 - v00) * sx)) * sz;
        }
        function fbm(x, z, s, o = 6) { let v = 0, a = 1, f = 1, m = 0; for (let i = 0; i < o; i++) { v += a * noise2D(x * f, z * f, s + i * 1000); m += a; a *= 0.5; f *= 2; } return v / m; }
        function ridged(x, z, s) {
            let v = 0, a = 1, f = 1, m = 0;
            for (let i = 0; i < 4; i++) { let n = Math.abs(noise2D(x * f, z * f, s + i * 500)); v += a * (1 - n); m += a; a *= 0.5; f *= 2; }
            return v / m;
        }
        function temp(x, z, s) { return fbm(x * 0.004 + 5, z * 0.004 + 3, s + 20000, 4) * 0.7 + x * 0.0003; }
        function moist(x, z, s) { return fbm(x * 0.006 - 2, z * 0.006 + 2, s + 40000, 4); }
        function treeDensity(x, z, s) { return fbm(x * 0.04 + 7, z * 0.04 - 5, s + 60000, 3); }
        function rngFunc(a) { return () => { a |= 0; a = a + 0x6d2b79f5 | 0; let t = Math.imul(a ^ a >>> 15, 1 | a); t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t; return ((t ^ t >>> 14) >>> 0) / 4294967296; }; }

        const CHUNK = 16, WATER_Y = 4, MAX_Y = 60;
        const loaded = new Map();
        const boxGeo = new THREE.BoxGeometry(1, 1, 1);
        let totalGrass = 0, totalLand = 0;
        let grassThreshold = 0.5;
        let mountainThresh = 0.7;
        let waterThresh = 0.4;

        function chunkKey(cx, cz) { return `${cx},${cz}`; }
        const heightCache = new Map();
        function getHeight(wx, wz, seed) {
            const key = `${wx},${wz}`;
            if (heightCache.has(key)) return heightCache.get(key);
            const region = fbm(wx * 0.01, wz * 0.01, seed + 10000, 4);
            const detail = fbm(wx * 0.08, wz * 0.08, seed, 5);
            const canyon = ridged(wx * 0.06, wz * 0.06, seed + 5000) * 0.4;
            let h;
            if (region > mountainThresh) {
                h = 35 + (region - mountainThresh) / (1 - mountainThresh) * 25 + detail * 6 - canyon * 8;
            } else if (region < waterThresh) {
                h = (region / waterThresh) * 6 + detail * 2 - canyon * 3;
                const island = fbm(wx * 0.15 + 3, wz * 0.15 + 3, seed + 3000, 3);
                if (region < waterThresh * 0.5 && island > 0.75) h += island * 10;
            } else {
                const t = (region - waterThresh) / (mountainThresh - waterThresh);
                h = 10 + t * 18 + detail * 4 - canyon * 3;
            }
            h = Math.max(1, Math.min(MAX_Y, Math.round(h)));
            heightCache.set(key, h);
            return h;
        }

        function generateChunk(cx, cz, seed) {
            const map = new Map();
            for (let t of Object.values(BlockTypes)) map.set(t, []);
            const info = [];
            const bx = cx * CHUNK, bz = cz * CHUNK;
            let gCount = 0, lCount = 0;
            for (let ix = 0; ix < CHUNK; ix++) {
                for (let iz = 0; iz < CHUNK; iz++) {
                    const wx = bx + ix, wz = bz + iz;
                    const h = getHeight(wx, wz, seed);
                    const T = temp(wx, wz, seed);
                    const M = moist(wx, wz, seed);
                    const region = fbm(wx * 0.01, wz * 0.01, seed + 10000, 4);
                    let surface = BlockTypes.GRASS;
                    let treeChance = 0.02, flowerChance = 0.04;
                    if (h <= WATER_Y - 2 || (region < waterThresh && h <= WATER_Y + 1)) {
                        surface = BlockTypes.WATER;
                        treeChance = 0; flowerChance = 0;
                    } else if (h <= WATER_Y + 1 && h > WATER_Y - 2) {
                        surface = BlockTypes.SAND;
                        treeChance = 0; flowerChance = 0;
                    } else if (h > 50) {
                        surface = BlockTypes.SNOW;
                        treeChance = 0.005; flowerChance = 0.01;
                    } else if (T < -0.08 && M < -0.1 && h > 35) {
                        surface = BlockTypes.STONE;
                        treeChance = 0.005; flowerChance = 0.01;
                    } else if (T > 0.18 && M < -0.15 && region > waterThresh && region < mountainThresh) {
                        surface = BlockTypes.SAND;
                        treeChance = 0.005; flowerChance = 0.02;
                    } else {
                        const suitability = Math.max(0, 1 - Math.abs(M - 0.5) * 2.5 - Math.abs(T - 0.45) * 2.5 - Math.abs(h - 20) / 30);
                        if (suitability > grassThreshold) {
                            surface = BlockTypes.GRASS; gCount++;
                            treeChance = 0.02; flowerChance = 0.04;
                        } else {
                            surface = h > 40 ? BlockTypes.STONE : BlockTypes.GRASS;
                            treeChance = 0.01; flowerChance = 0.02;
                        }
                    }
                    if (h > WATER_Y) lCount++;
                    let isLocalLow = false;
                    if (surface !== BlockTypes.WATER && h > WATER_Y && region < mountainThresh) {
                        let lowerCount = 0;
                        for (let dx = -1; dx <= 1; dx++) {
                            for (let dz = -1; dz <= 1; dz++) {
                                if (dx === 0 && dz === 0) continue;
                                const nh = getHeight(wx + dx, wz + dz, seed);
                                if (nh > h) lowerCount++;
                            }
                        }
                        if (lowerCount >= 6) isLocalLow = true;
                    }
                    if (surface === BlockTypes.WATER || (isLocalLow && h > WATER_Y)) {
                        for (let y = WATER_Y; y >= 0; y--) map.get(BlockTypes.WATER).push({ x: wx, y, z: wz });
                        if (isLocalLow && h > WATER_Y) map.get(BlockTypes.WATER).push({ x: wx, y: h, z: wz });
                    } else {
                        map.get(BlockTypes.BEDROCK).push({ x: wx, y: 0, z: wz });
                        const stoneTop = Math.max(1, h - 5);
                        for (let y = 1; y < stoneTop; y++) {
                            const rng = rngFunc(seed + wx * 1000 + wz * 100 + y * 10);
                            const r = rng();
                            if (r < 0.06) map.get(BlockTypes.COAL).push({ x: wx, y, z: wz });
                            else if (r < 0.09) map.get(BlockTypes.IRON).push({ x: wx, y, z: wz });
                            else map.get(BlockTypes.STONE).push({ x: wx, y, z: wz });
                        }
                        for (let y = stoneTop; y < h; y++) map.get(BlockTypes.DIRT).push({ x: wx, y, z: wz });
                        map.get(surface).push({ x: wx, y: h, z: wz });
                        if (h < WATER_Y) map.get(BlockTypes.WATER).push({ x: wx, y: WATER_Y, z: wz });
                    }
                    info.push({ x: wx, z: wz, height: h, surface, treeChance, flowerChance });
                }
            }
            return { map, info, gCount, lCount };
        }

        function addTrees(map, info, seed) {
            const rng = rngFunc(seed + 77777);
            for (const t of info) {
                if (t.treeChance > 0 && t.surface === BlockTypes.GRASS) {
                    const density = Math.max(0, Math.min(1, treeDensity(t.x, t.z, seed) * 1.3 - 0.1));
                    const effectiveChance = t.treeChance * (0.05 + density * 3.5);
                    if (rng() < effectiveChance) {
                        const th = 2 + Math.floor(rng() * 3);
                        for (let y = t.height + 1; y <= t.height + th; y++) map.get(BlockTypes.WOOD).push({ x: t.x, y, z: t.z });
                        const cb = t.height + th;
                        for (let dx = -1; dx <= 1; dx++) for (let dz = -1; dz <= 1; dz++) if (dx || dz) map.get(BlockTypes.LEAVES).push({ x: t.x + dx, y: cb, z: t.z + dz });
                        const ct = cb + 1;
                        for (let dx = -1; dx <= 1; dx++) for (let dz = -1; dz <= 1; dz++) {
                            if (Math.abs(dx) === 1 && Math.abs(dz) === 1 && rng() > 0.5) continue;
                            map.get(BlockTypes.LEAVES).push({ x: t.x + dx, y: ct, z: t.z + dz });
                        }
                        if (rng() > 0.4) {
                            map.get(BlockTypes.LEAVES).push({ x: t.x, y: ct + 1, z: t.z });
                            if (rng() > 0.5) map.get(BlockTypes.LEAVES).push({ x: t.x + 1, y: ct + 1, z: t.z });
                            if (rng() > 0.5) map.get(BlockTypes.LEAVES).push({ x: t.x - 1, y: ct + 1, z: t.z });
                        }
                    }
                }
            }
            const frng = rngFunc(seed + 99999);
            const colors = ['#ff6b6b', '#ffd93d', '#ff922b', '#f06595', '#e599f7', '#ffffff', '#51cf66', '#74c0fc'];
            for (const t of info) {
                if (t.flowerChance > 0 && t.surface === BlockTypes.GRASS) {
                    const density = Math.max(0, Math.min(1, treeDensity(t.x, t.z, seed) * 1.3 - 0.1));
                    const effectiveChance = t.flowerChance * (0.1 + density * 2.5);
                    if (frng() < effectiveChance) {
                        map.get(BlockTypes.FLOWER).push({ x: t.x, y: t.height + 1, z: t.z, color: colors[Math.floor(frng() * colors.length)] });
                    }
                }
            }
        }

        function buildGroup(blockMap) {
            const group = new THREE.Group();
            for (const [type, blocks] of blockMap) {
                if (!blocks.length) continue;
                const mat = type === BlockTypes.FLOWER ? getMat(type, blocks[0].color) : getMat(type);
                const inst = new THREE.InstancedMesh(boxGeo, mat, blocks.length);
                inst.castShadow = inst.receiveShadow = true;
                const d = new THREE.Object3D();
                for (let i = 0; i < blocks.length; i++) {
                    d.position.set(blocks[i].x, blocks[i].y, blocks[i].z);
                    d.updateMatrix();
                    inst.setMatrixAt(i, d.matrix);
                }
                inst.instanceMatrix.needsUpdate = true;
                group.add(inst);
            }
            return group;
        }

        function loadChunk(cx, cz, seed) {
            const key = chunkKey(cx, cz);
            if (loaded.has(key)) return;
            const { map, info, gCount, lCount } = generateChunk(cx, cz, seed);
            addTrees(map, info, seed);
            const group = buildGroup(map);
            loaded.set(key, group);
            scene.add(group);
            totalGrass += gCount;
            totalLand += lCount;
        }

        function clearAll() {
            for (const [, group] of loaded) {
                scene.remove(group);
                group.traverse(c => {
                    if (c.geometry && c.geometry !== boxGeo) c.geometry.dispose();
                    if (c.material) {
                        if (Array.isArray(c.material)) c.material.forEach(m => m.dispose());
                        else c.material.dispose();
                    }
                });
            }
            loaded.clear();
            heightCache.clear();
            totalGrass = 0; totalLand = 0;
        }

        let currentSeed = Math.floor(Math.random() * 1000000);
        const loadRad = 4;
        function updateChunks() {
            const cx = Math.round(camera.position.x / CHUNK);
            const cz = Math.round(camera.position.z / CHUNK);
            for (let dx = -loadRad; dx <= loadRad; dx++)
                for (let dz = -loadRad; dz <= loadRad; dz++)
                    loadChunk(cx + dx, cz + dz, currentSeed);
            document.getElementById('chunk-count').textContent = loaded.size;
            const ratio = totalLand > 0 ? (totalGrass / totalLand * 100).toFixed(1) : '0';
            document.getElementById('grass-ratio').textContent = `~${ratio}%`;
        }

        function fullReload(seed) {
            currentSeed = seed;
            const r = rngFunc(seed + 12345);
            grassThreshold = 0.2 + r() * 0.7;
            mountainThresh = 0.65 + r() * 0.15;
            waterThresh = 0.35 + r() * 0.25;
            clearAll();
            updateChunks();
            document.getElementById('seed-text').textContent = seed;
        }

        document.getElementById('btn-regen').addEventListener('click', () => {
            fullReload(currentSeed);
        });
        document.getElementById('btn-random').addEventListener('click', () => {
            const newSeed = Math.floor(Math.random() * 1000000);
            fullReload(newSeed);
        });
        document.getElementById('btn-reset').addEventListener('click', () => {
            camera.position.set(70, 55, 70);
            controls.target.set(0, 12, 0);
            controls.update();
        });

        window.addEventListener('resize', () => {
            camera.aspect = innerWidth / innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(innerWidth, innerHeight);
        });

        fullReload(currentSeed);
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
